version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      pi-peers:
        patterns: ["@mariozechner/*", "@sinclair/*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
